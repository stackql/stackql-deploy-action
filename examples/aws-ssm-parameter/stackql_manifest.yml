version: 1
name: "stackql-deploy-action-test"
description: SSM parameter test stack for stackql-deploy-action CI validation
providers:
  - awscc
globals:
  - name: region
    description: aws region
    value: "{{ AWS_REGION }}"
  - name: global_tags
    value:
      - Key: 'stackql:stack-name'
        Value: "{{ stack_name }}"
      - Key: 'stackql:stack-env'
        Value: "{{ stack_env }}"
      - Key: 'stackql:resource-name'
        Value: "{{ resource_name }}"
resources:

  - name: test_ssm_parameter
    file: aws/ssm/parameters.iql
    props:
      - name: name
        value: "/{{ stack_name }}/{{ stack_env }}/test-param"
      - name: type
        value: "String"
      - name: value
        value: "stackql-deploy-action-test-value"
      - name: description
        value: "Test SSM parameter for stackql-deploy-action CI"
      - name: policies
        value: ""
      - name: allowed_pattern
        value: ""
      - name: tier
        value: "Standard"
      - name: tags
        value: []
        merge:
          - global_tags
      - name: data_type
        value: "text"
    exports:
      - name
      - value
      - type
