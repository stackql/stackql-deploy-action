version: 1
name: "stackql-deploy-action-test"
description: SSM parameter test stack for stackql-deploy-action CI validation
providers:
  - awscc
globals:
  - name: region
    description: aws region
    value: "{{ AWS_REGION }}"
  - name: global_tags
    value:
      'stackql:stack-name': "{{ stack_name }}"
      'stackql:stack-env': "{{ stack_env }}"
      'stackql:resource-name': "{{ resource_name }}"
resources:
  - name: test_ssm_parameter
    file: aws/ssm/parameters.iql
    props:
      - name: name
        value: "/{{ stack_name }}/{{ stack_env }}/test-param"
      - name: type
        value: "String"
      - name: value
        value: "stackql-deploy-action-test-value"
      - name: description
        value: "Test SSM parameter for stackql-deploy-action CI"
      - name: tier
        value: "Standard"
      - name: tags
        value: "{{ global_tags }}"
      - name: data_type
        value: "text"
    exports:
      - name
      - value
      - type
