name: StackQL Deploy Action Test (AWS SSM)

on:
  push:
    branches:
      - main

jobs:
  aws-ssm-test:
    name: Deploy, Test, Update, and Teardown AWS SSM Parameter
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 1: Deploy the SSM parameter
      # -----------------------------------------------------------------------
      - name: Deploy SSM Parameter
        uses: ./
        with:
          command: 'build'
          stack_dir: 'examples/aws-ssm-parameter'
          stack_env: 'dev'
          env_vars: 'AWS_REGION=${{ vars.AWS_REGION }}'
          log_level: 'info'

      # -----------------------------------------------------------------------
      # Step 2: Test the deployed SSM parameter
      # -----------------------------------------------------------------------
      - name: Test SSM Parameter
        uses: ./
        with:
          command: 'test'
          stack_dir: 'examples/aws-ssm-parameter'
          stack_env: 'dev'
          env_vars: 'AWS_REGION=${{ vars.AWS_REGION }}'
          log_level: 'info'

      # -----------------------------------------------------------------------
      # Step 3: Update the manifest - add an extra tag
      # -----------------------------------------------------------------------
      - name: Update Manifest - Add Tag
        shell: bash
        run: |
          # Append an additional tag to the test_ssm_parameter resource tags value.
          # yq v4 is pre-installed on ubuntu-latest runners.
          yq -i '
            (.resources[] | select(.name == "test_ssm_parameter") | .props[] | select(.name == "tags")).value +=
              [{"Key": "stackql:updated", "Value": "true"}]
          ' examples/aws-ssm-parameter/stackql_manifest.yml

          echo "Updated manifest:"
          cat examples/aws-ssm-parameter/stackql_manifest.yml

      # -----------------------------------------------------------------------
      # Step 4: Redeploy with the updated manifest (tag update)
      # -----------------------------------------------------------------------
      - name: Redeploy SSM Parameter with Updated Tag
        uses: ./
        with:
          command: 'build'
          stack_dir: 'examples/aws-ssm-parameter'
          stack_env: 'dev'
          env_vars: 'AWS_REGION=${{ vars.AWS_REGION }}'
          log_level: 'info'

      # -----------------------------------------------------------------------
      # Step 5: Test again after the update
      # -----------------------------------------------------------------------
      - name: Test SSM Parameter (Post-Update)
        uses: ./
        with:
          command: 'test'
          stack_dir: 'examples/aws-ssm-parameter'
          stack_env: 'dev'
          env_vars: 'AWS_REGION=${{ vars.AWS_REGION }}'
          log_level: 'info'

      # -----------------------------------------------------------------------
      # Step 6: Teardown - always run to avoid leaving resources behind
      # -----------------------------------------------------------------------
      - name: Teardown SSM Parameter
        if: always()
        uses: ./
        with:
          command: 'teardown'
          stack_dir: 'examples/aws-ssm-parameter'
          stack_env: 'dev'
          env_vars: 'AWS_REGION=${{ vars.AWS_REGION }}'
          log_level: 'info'
